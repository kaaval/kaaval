name: Helm Lint

on:
  push:
    branches: [main]
    paths:
      - 'deploy/helm/**'
  pull_request:
    branches: [main]
    paths:
      - 'deploy/helm/**'

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: deploy/helm/kaaval
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - name: Set up Helm
        uses: azure/setup-helm@5119fcb9089d432be92e2993f18951c0b8c3644a
        with:
          version: v3.14.4
      - name: Add bitnami repo
        run: helm repo add bitnami https://charts.bitnami.com/bitnami
      - name: Update dependencies
        run: helm dependency update
      - name: Lint chart
        run: helm lint .
      - name: Template chart (dry-run)
        run: helm template . --dry-run
