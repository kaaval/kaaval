version: 2
updates:
  - package-ecosystem: pip
    directory: /control-plane
    schedule:
      interval: weekly
    groups:
      python-patch:
        update-types: ["patch"]

  - package-ecosystem: npm
    directory: /dashboard
    schedule:
      interval: weekly
    groups:
      npm-patch:
        update-types: ["patch"]
    ignore:
      # eslint 10 is blocked by eslint-config-next / eslint-plugin-import peer
      # support (see PR #25); re-enable when the plugin chain declares support
      - dependency-name: eslint
        update-types: ["version-update:semver-major"]

  - package-ecosystem: docker
    directories:
      - /control-plane
      - /dashboard
    schedule:
      interval: weekly

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
