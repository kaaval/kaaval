name: Feature request
description: Propose a capability that isn't a single detection rule
title: "[feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: The problem
      description: What are you trying to do that Kaaval doesn't support today?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: >-
        What you'd like to see. If it touches the finding pipeline, note how it
        fits the existing shape (scoring, remediation, output formats).
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches, and why this one.
  - type: textarea
    id: philosophy
    attributes:
      label: Does it fit the philosophy?
      description: >-
        Kaaval is about contextual, explained, remediable findings — not raw
        detection volume. A sentence on how this serves that helps us prioritize.
