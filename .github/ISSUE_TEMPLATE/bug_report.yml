name: Bug report
description: Something isn't working as documented
title: "[bug] "
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected instead.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: >-
        Steps to reproduce — ideally against the dev testbed (`make setup-dev`).
        A false positive/negative? Include the offending RBAC object or CVE finding.
      render: shell
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Kaaval version / commit
      placeholder: v1.1.0 / 094c406
    validations:
      required: true
  - type: dropdown
    id: how-running
    attributes:
      label: How you're running it
      options:
        - docker-compose stack
        - headless CLI (docker)
        - headless CLI (from source)
        - dev testbed (make setup-dev)
        - GitHub Action
    validations:
      required: true
  - type: input
    id: k8s-version
    attributes:
      label: Kubernetes version (if relevant)
      placeholder: kubectl version output
  - type: textarea
    id: logs
    attributes:
      label: Logs / output
      description: Paste relevant control-plane logs or CLI output.
      render: shell
