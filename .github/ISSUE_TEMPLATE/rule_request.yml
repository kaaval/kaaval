name: Rule request
description: Propose a new detection rule (RBAC misconfiguration, CVE source, or other finding)
title: "[rule] "
labels: ["rule-request", "help wanted"]
body:
  - type: textarea
    id: what-detect
    attributes:
      label: What should Kaaval detect?
      description: >-
        Describe the misconfiguration or risk, and the Kubernetes objects it
        shows up in (Role/ClusterRole rule, binding, workload spec, etc.).
    validations:
      required: true
  - type: textarea
    id: why-matters
    attributes:
      label: Why it matters
      description: >-
        What's the blast radius if this goes unnoticed? What can an attacker or
        a compromised workload do with it?
    validations:
      required: true
  - type: input
    id: benchmark
    attributes:
      label: Benchmark / standard mapping (if any)
      description: >-
        Cite the exact control if one exists — e.g. "CIS Kubernetes Benchmark
        v1.12.0 5.1.x", an OWASP Kubernetes Top 10 item, or the Kubernetes RBAC
        Good Practices doc. Leave blank if you're not sure; we'll verify before
        it ships.
      placeholder: CIS Kubernetes Benchmark v1.12.0 5.1.x
  - type: dropdown
    id: severity
    attributes:
      label: Suggested severity
      options:
        - CRITICAL
        - HIGH
        - MEDIUM
        - LOW
    validations:
      required: true
  - type: textarea
    id: severity-why
    attributes:
      label: Why that severity
      description: A sentence on why.
  - type: textarea
    id: example
    attributes:
      label: Example trigger
      description: A snippet of the manifest that should be flagged, if you have one.
      render: yaml
