name: "Kaaval RBAC Scan"
description: >-
  Scan Kubernetes RBAC manifests (shift-left) or a live cluster with Kaaval and
  gate the pipeline on the Contextual Risk Score — context-aware gating instead
  of a flat severity threshold.
author: "rrskris"

inputs:
  manifests:
    description: "Path to RBAC YAML manifests (file or directory) — shift-left mode"
    required: false
  kubeconfig:
    description: "Path to a kubeconfig file — live-cluster mode (use a read-only CI service account)"
    required: false
  context-file:
    description: "Path to the kaaval.yaml risk context (risk context as code)"
    required: false
  fail-on-score:
    description: "Fail the job if any finding's contextual score is >= this value"
    required: false
  fail-on-severity:
    description: "Fail the job if any finding is at/above this severity (LOW/MEDIUM/HIGH/CRITICAL)"
    required: false
  output:
    description: "Output format: table or json"
    required: false
    default: "table"
  kaaval-ref:
    description: "Git ref of Kaaval to run"
    required: false
    default: "main"

runs:
  using: "composite"
  steps:
    - name: Check out Kaaval
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      with:
        repository: kaaval/kaaval
        ref: ${{ inputs.kaaval-ref }}
        path: .kaaval-scan

    - name: Set up Python
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
      with:
        python-version: "3.12"
        cache: pip
        cache-dependency-path: .kaaval-scan/control-plane/requirements.txt

    - name: Install Kaaval
      shell: bash
      run: pip install -q -r .kaaval-scan/control-plane/requirements.txt

    - name: Run Kaaval scan
      shell: bash
      working-directory: .kaaval-scan/control-plane
      run: |
        args=(scan rbac --output "${{ inputs.output }}")
        [ -n "${{ inputs.manifests }}" ]        && args+=(--manifests "$GITHUB_WORKSPACE/${{ inputs.manifests }}")
        [ -n "${{ inputs.kubeconfig }}" ]       && args+=(--kubeconfig "$GITHUB_WORKSPACE/${{ inputs.kubeconfig }}")
        [ -n "${{ inputs.context-file }}" ]     && args+=(--context-file "$GITHUB_WORKSPACE/${{ inputs.context-file }}")
        [ -n "${{ inputs.fail-on-score }}" ]    && args+=(--fail-on-score "${{ inputs.fail-on-score }}")
        [ -n "${{ inputs.fail-on-severity }}" ] && args+=(--fail-on-severity "${{ inputs.fail-on-severity }}")
        python -m app.cli "${args[@]}"
