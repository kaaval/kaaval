apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: restrict-broad-cluster-admin-binding
  annotations:
    policies.kyverno.io/title: Restrict cluster-admin Bindings to Broad Identities
    policies.kyverno.io/category: Security
    policies.kyverno.io/severity: critical
    policies.kyverno.io/subject: RoleBinding, ClusterRoleBinding, RBAC
    kyverno.io/kyverno-version: 1.11.0
    policies.kyverno.io/minversion: 1.6.0
    kyverno.io/kubernetes-version: "1.27"
    policies.kyverno.io/description: >-
      The upstream restrict-binding-clusteradmin policy denies every new
      binding to cluster-admin. This variant targets the specifically
      catastrophic subset: binding cluster-admin to a broad identity - the
      `default` ServiceAccount, or the system:authenticated,
      system:unauthenticated, or system:masters groups - which hands
      cluster-admin to every pod in a namespace or every token holder.
      The stock `cluster-admin` ClusterRoleBinding (cluster-admin ->
      system:masters) that ships with every cluster is exempted by name.
      Mirrors the cluster_admin_binding rule in Argus's RBAC scanner
      (rbac_service.py).
spec:
  validationFailureAction: Audit
  background: true
  rules:
    - name: broad-cluster-admin-binding
      match:
        any:
        - resources:
            kinds:
              - RoleBinding
              - ClusterRoleBinding
      exclude:
        any:
        - resources:
            kinds:
              - ClusterRoleBinding
            names:
              - cluster-admin
      validate:
        message: >-
          Binding cluster-admin to a broad identity (default ServiceAccount,
          system:authenticated, system:unauthenticated, or system:masters) is
          not allowed.
        deny:
          conditions:
            all:
            - key: "{{ request.object.roleRef.name }}"
              operator: Equals
              value: cluster-admin
            any:
            - key: ["system:authenticated", "system:unauthenticated", "system:masters"]
              operator: AnyIn
              value: "{{ request.object.subjects[?kind=='Group'].name || `[]` }}"
            - key: ["default"]
              operator: AnyIn
              value: "{{ request.object.subjects[?kind=='ServiceAccount'].name || `[]` }}"
